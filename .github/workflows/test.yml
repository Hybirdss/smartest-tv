name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # `src/smartest_tv/_engine/` is gitignored — real engine ships only
      # in the PyPI wheel. Create an empty package dir so hatch's
      # `force-include` check passes. resolve.py already has a runtime
      # `_has_engine()` fallback that uses the public API when the private
      # engine is missing, so tests run fine with an empty stub.
      - name: Scaffold empty _engine package for CI
        run: |
          mkdir -p src/smartest_tv/_engine
          echo '"""CI stub — real _engine ships in the PyPI wheel."""' \
            > src/smartest_tv/_engine/__init__.py

      - name: Install package with dev dependencies
        run: pip install -e ".[dev]" pytest-cov

      - name: Run unit tests with coverage
        run: python -m pytest tests/ -v --cov=smartest_tv --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
